<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Chat Application</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Login Screen -->
        <div id="login-screen" class="screen active">
            <div class="login-box glass-panel">
                <h1>Welcome to Chat</h1>
                <p>Enter a username to join the conversation.</p>
                <form id="login-form">
                    <input type="text" id="username-input" placeholder="Username" autocomplete="off" required>
                    <button type="submit" class="btn primary-btn">Join Chat</button>
                </form>
                <p id="login-error" class="error-msg"></p>
            </div>
        </div>

        <!-- Chat Dashboard (Lobby + Chat Room) -->
        <div id="chat-dashboard" class="screen hidden">
            <!-- Sidebar for Rooms -->
            <aside class="sidebar glass-panel">
                <div class="sidebar-header">
                    <h2>Rooms</h2>
                </div>
                <ul id="rooms-list" class="rooms-list">
                    <!-- Room items will be injected here -->
                </ul>
                <div class="create-room">
                    <form id="create-room-form">
                        <input type="text" id="new-room-input" placeholder="New room name..." required>
                        <button type="submit" class="btn secondary-btn">+</button>
                    </form>
                </div>
                <div class="user-info">
                    <span id="current-user-display" class="user-name"></span>
                </div>
            </aside>

            <!-- Main Chat Area -->
            <main class="chat-area glass-panel">
                <header class="chat-header">
                    <h2 id="current-room-name">Select a Room</h2>
                </header>
                
                <div id="messages-container" class="messages-container">
                    <!-- Messages will appear here -->
                    <div class="system-message">Welcome! Please join a room from the sidebar.</div>
                </div>

                <div class="chat-input-area">
                    <form id="chat-form">
                        <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off" disabled>
                        <button type="submit" id="send-btn" class="btn primary-btn" disabled>Send</button>
                    </form>
                </div>
            </main>
        </div>
    </div>

    <!-- Socket.IO client library -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="main.js"></script>
</body>
</html>
